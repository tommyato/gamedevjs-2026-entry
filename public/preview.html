<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clockwork Climb — 16:9 preview</title>
  <meta name="robots" content="noindex" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #frame-box {
      aspect-ratio: 16 / 9;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      background: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div id="frame-box">
    <iframe
      src="./index.html"
      allow="autoplay; fullscreen; gamepad; pointer-lock"
      title="Clockwork Climb"
    ></iframe>
  </div>
</body>
</html>
