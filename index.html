<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Clockwork Climb — a timing-based 3D platformer for the Gamedev.js Jam 2026. Climb a massive clockwork tower as a tiny bronze robot. Theme: MACHINES.">
  <meta name="author" content="tommyato">
  <meta property="og:title" content="Clockwork Climb — Gamedev.js Jam 2026">
  <meta property="og:description" content="Timing-based 3D platformer. Climb a massive clockwork tower as a tiny bronze robot. Theme: MACHINES.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tommyato.github.io/gamedevjs-2026-entry/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Clockwork Climb — Gamedev.js Jam 2026">
  <meta name="twitter:description" content="Timing-based 3D platformer. Climb a massive clockwork tower as a tiny bronze robot.">
  <title>CLOCKWORK CLIMB — GAMEDEV.JS JAM 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at top, #1d140f 0%, #050508 65%); }
    canvas { display: block; }
    #game-container { width: 100%; height: 100%; position: relative; }

    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; color: #fff; z-index: 10;
      padding: 20px;
    }
    .hud-panel {
      position: absolute; top: 20px; right: 20px;
      min-width: 220px;
      padding: 16px 18px;
      border: 1px solid rgba(255, 196, 120, 0.18);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(27, 18, 14, 0.78), rgba(13, 10, 9, 0.62));
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 226, 176, 0.08);
      backdrop-filter: blur(10px);
    }
    .hud-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }
    .hud-row + .hud-row {
      margin-top: 10px;
    }
    .hud-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: #c7a271;
    }
    #hud-score {
      font-size: 40px;
      font-weight: 900;
      color: #ffaa44;
      text-shadow: 0 0 24px rgba(255,170,68,0.45);
    }
    #hud-best {
      font-size: 20px;
      font-weight: 700;
      color: #f3d7b1;
    }
    #hud-bolts {
      font-size: 18px;
      font-weight: 700;
      color: #ffd35e;
      text-shadow: 0 0 18px rgba(255, 211, 94, 0.35);
    }
    #hud-status {
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: 2px;
      color: #7fd6ff;
    }
    #hud-toast {
      position: absolute;
      top: 76px;
      left: 50%;
      transform: translate(-50%, 12px);
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(122, 223, 255, 0.32);
      background: rgba(10, 21, 28, 0.8);
      color: #aef0ff;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      transition: opacity 120ms ease-out, transform 120ms ease-out;
    }
    #hud-controls {
      position: absolute;
      left: 20px;
      bottom: 20px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(10, 10, 12, 0.46);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #a8adb7;
      font-size: 11px;
      letter-spacing: 2px;
    }
    #touch-controls {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
    }
    #touch-left-zone {
      position: absolute;
      inset: auto auto 0 0;
      width: 52%;
      height: 48%;
      pointer-events: auto;
    }
    #touch-joystick {
      position: absolute;
      width: 132px;
      height: 132px;
      margin-left: -66px;
      margin-top: -66px;
      border-radius: 50%;
      border: 1px solid rgba(255, 226, 176, 0.18);
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.12), rgba(16,12,10,0.38));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      opacity: 0;
      transition: opacity 100ms ease-out;
    }
    #touch-joystick.active {
      opacity: 1;
    }
    #touch-joystick-thumb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      margin-left: -29px;
      margin-top: -29px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255, 208, 140, 0.7), rgba(181, 103, 39, 0.6));
      border: 1px solid rgba(255, 231, 182, 0.2);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
    }
    #touch-jump {
      position: absolute;
      right: 28px;
      bottom: 34px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      border: 1px solid rgba(159, 236, 255, 0.26);
      background: radial-gradient(circle at 35% 35%, rgba(127, 214, 255, 0.38), rgba(15, 41, 55, 0.18));
      color: #d7f8ff;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 18px;
      letter-spacing: 2px;
      pointer-events: auto;
      opacity: 0.88;
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.22);
    }
    #touch-jump.pressed {
      transform: scale(0.94);
      opacity: 1;
    }

    #title-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; pointer-events: auto;
      background: radial-gradient(circle at center, rgba(0,0,0,0.18), rgba(0,0,0,0.58));
    }
    #title-overlay h1 {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; font-size: 56px; font-weight: 900;
      color: #ffaa44; text-shadow: 0 0 60px rgba(255,170,68,0.4);
      letter-spacing: 6px; margin-bottom: 16px; text-align: center;
    }
    #title-overlay .tagline {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; font-size: 14px; color: #668899;
      letter-spacing: 4px; margin-bottom: 40px; text-align: center;
    }
    #title-overlay .prompt {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; font-size: 18px; color: #ffcc00;
      animation: pulse 1.5s ease-in-out infinite; text-align: center;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 8px rgba(255, 200, 50, 0.6), 0 0 20px rgba(255, 180, 0, 0.4); }
      50% { text-shadow: 0 0 18px rgba(255, 220, 80, 1), 0 0 40px rgba(255, 200, 0, 0.7); }
    }
    .tagline.new-best {
      color: #ffd040;
      animation: glow 1.2s ease-in-out infinite;
    }
    .game-over-stats {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 13px;
      letter-spacing: 3px;
      color: #c7a271;
      margin-top: -24px;
      margin-bottom: 24px;
    }
    #sound-toggle {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 196, 120, 0.18);
      background: linear-gradient(180deg, rgba(27, 18, 14, 0.78), rgba(13, 10, 9, 0.62));
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 226, 176, 0.08);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      pointer-events: auto;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    #sound-toggle:hover { background: linear-gradient(180deg, rgba(40, 28, 20, 0.85), rgba(20, 15, 12, 0.72)); }
    .hidden { display: none !important; }
    @media (max-width: 720px) {
      .hud-panel {
        top: 14px;
        right: 14px;
        min-width: 190px;
        padding: 14px 16px;
      }
      #hud-score {
        font-size: 34px;
      }
      #hud-controls {
        left: 14px;
        bottom: 14px;
        max-width: 220px;
      }
      #sound-toggle {
        bottom: 14px;
        right: 14px;
      }
      #title-overlay h1 {
        font-size: 42px;
        letter-spacing: 4px;
      }
      #title-overlay .tagline {
        font-size: 12px;
        letter-spacing: 3px;
        padding: 0 24px;
      }
    }
  </style>
</head>
  <body>
  <div id="game-container">
    <div id="hud" class="hidden">
      <div class="hud-panel">
        <div class="hud-row">
          <div>
            <div class="hud-label">HEIGHT</div>
            <div id="hud-score">0</div>
          </div>
          <div>
            <div class="hud-label">BEST</div>
            <div id="hud-best">0</div>
          </div>
        </div>
        <div class="hud-row">
          <div>
            <div class="hud-label">BOLTS</div>
            <div id="hud-bolts">0</div>
          </div>
        </div>
        <div id="hud-status">NEXT 25m</div>
      </div>
      <div id="hud-toast"></div>
      <div id="hud-controls">WASD / ARROWS TO MOVE · SPACE OR TAP TO JUMP</div>
      <button id="sound-toggle" type="button" aria-label="Toggle sound">🔊</button>
    </div>
    <div id="touch-controls" class="hidden">
      <div id="touch-left-zone">
        <div id="touch-joystick">
          <div id="touch-joystick-thumb"></div>
        </div>
      </div>
      <button id="touch-jump" type="button" aria-label="Jump">JUMP</button>
    </div>
    <div id="title-overlay">
      <h1>CLOCKWORK CLIMB</h1>
      <div class="tagline">GAMEDEV.JS JAM 2026 — Theme: MACHINES</div>
      <div class="game-over-stats hidden"></div>
      <div class="prompt">PRESS SPACE OR CLICK TO CLIMB</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
