      letter-spacing: 6px; margin-bottom: 16px; text-align: center;

      width: min(280px, calc(100vw - 64px));

      font-weight: 700;

    .title-action-btn:active {
      transform: translateY(1px);
    }
    #title-overlay .prompt {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      color: #ffe1a9;
      border: 1px solid rgba(255, 196, 120, 0.55);
      background: linear-gradient(180deg, rgba(64, 40, 18, 0.95), rgba(28, 18, 10, 0.88));
      box-shadow: 0 14px 32px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255, 226, 176, 0.22), 0 0 24px rgba(255, 170, 68, 0.22);
      animation: play-pulse 1.8s ease-in-out infinite;
    }

    .game-over-card {
      width: min(400px, calc(100vw - 40px));

      background: linear-gradient(180deg, rgba(27, 18, 14, 0.78), rgba(13, 10, 9, 0.62));

      backdrop-filter: blur(10px);
      text-align: left;

    .game-over-layout {
      display: grid;

      align-items: baseline;

    .stat-label {

    @media (min-aspect-ratio: 4/3) {
      .game-over-card {
        max-width: min(520px, calc(100vw - 40px));

      .game-over-layout {
        grid-template-columns: repeat(2, minmax(0, 1fr));

        margin-bottom: 24px;

<body>
  <div id="game-container">
    <div id="close-call-overlay" aria-hidden="true"></div>
    <div id="shield-save-overlay" aria-hidden="true"></div>
    <div id="hud-toast" aria-live="polite" aria-atomic="true"></div>
    <div id="zone-announcement" aria-hidden="true"></div>
    <div id="tutorial-overlay" class="hidden" aria-hidden="true">
      <div id="tutorial-card">
        <div id="tutorial-controls"></div>
        <div id="tutorial-objective">Land on gears to climb higher!</div>
      </div>
    </div>
    <div id="pause-overlay" class="hidden">
      <h2>PAUSED</h2>
      <div class="prompt">PRESS ESC OR TAP TO RESUME</div>
      <button id="pause-restart" type="button">RESTART</button>
    </div>
    <div id="hud" class="hidden">
      <div class="hud-panel">
        <div class="hud-row">
          <div>
            <div class="hud-label">HEIGHT</div>
            <div id="hud-score">0</div>
          </div>
          <div>
            <div class="hud-label">BEST</div>
            <div id="hud-best">0</div>
          </div>
        </div>
        <div class="hud-row">
          <div>
            <div class="hud-label">BOLTS</div>
            <div id="hud-bolts">0</div>
          </div>
        </div>
        <div id="hud-status">NEXT 25m</div>
        <div id="hud-combo"></div>
      </div>
      <div id="hud-powerups">
        <div id="hud-shield-count" class="hud-powerup-slot empty">
          <span class="hud-powerup-icon">🛡</span>
          <span class="hud-powerup-text">
            <span class="hud-powerup-label">SHIELD</span>
            <span class="hud-powerup-count" data-role="count">—</span>
          </span>
        </div>
        <div id="hud-double-jump-charges" class="hud-powerup-slot empty">
          <span class="hud-powerup-icon">⬆</span>
          <span class="hud-powerup-text">
            <span class="hud-powerup-label">JUMPS</span>
            <span class="hud-powerup-count" data-role="count">—</span>
          </span>
        </div>
      </div>
      <div id="hud-controls">WASD / ARROWS TO MOVE · SPACE OR TAP TO JUMP</div>
      <button id="pause-btn" type="button" aria-label="Pause">⏸</button>
      <button id="sound-toggle" type="button" aria-label="Toggle sound">🔊</button>
    </div>
    <div id="touch-controls" class="hidden">
      <div id="touch-left-zone">
        <div id="touch-joystick">
          <div id="touch-joystick-thumb"></div>
        </div>
      </div>
      <button id="touch-jump" type="button" aria-label="Jump">JUMP</button>
    </div>
    <div id="title-overlay">
      <div class="title-copy-panel">
        <h1>CLOCKWORK CLIMB</h1>
        <div class="tagline">GAMEDEV.JS JAM 2026 — Theme: MACHINES</div>
        <div id="title-best" class="hidden"></div>
        <div id="title-actions">
          <button type="button" class="prompt title-action-btn">PLAY</button>
        </div>
      </div>
      <div class="game-over-card game-over-layout hidden">
        <div class="stat-row"><span class="stat-label">HEIGHT SCORE</span><span class="stat-value" id="go-height"></span></div>
        <div class="stat-row"><span class="stat-label">BOLT SCORE</span><span class="stat-value" id="go-bolts"></span></div>
        <div class="stat-row"><span class="stat-label">BOLTS COLLECTED</span><span class="stat-value" id="go-bolt-count"></span></div>
        <div class="stat-row"><span class="stat-label">BEST COMBO</span><span class="stat-value" id="go-combo"></span></div>
        <div class="stat-row"><span class="stat-label">TIME</span><span class="stat-value" id="go-time"></span></div>
        <div class="stat-row stat-total"><span class="stat-label">TOTAL SCORE</span><span class="stat-value" id="go-total"></span></div>
      </div>
      <button id="share-score-btn" class="hidden" type="button">SHARE ON X</button>
    </div>
  </div>
</body>
</html>
