  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at top, #1d140f 0%, #050508 65%); }
    canvas { display: block; }
    #game-container { width: 100%; height: 100%; position: relative; }
    #close-call-overlay {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0) 52%, rgba(255, 132, 42, 0.24) 100%);
      transition: opacity 140ms ease-out;
      mix-blend-mode: screen;
    }
    #tutorial-overlay {
      position: absolute;
      inset: 0;
      z-index: 18;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 1;
      transition: opacity 500ms ease;
      background: radial-gradient(circle at center, rgba(16, 11, 8, 0.42), rgba(5, 5, 8, 0.72));
    }
    #tutorial-overlay.hidden {
      opacity: 0;
    }
    #tutorial-card {
      max-width: min(760px, calc(100vw - 40px));
      padding: 22px 28px 20px;
      border-radius: 24px;
      border: 1px solid rgba(255, 196, 120, 0.24);
      background: linear-gradient(180deg, rgba(28, 20, 15, 0.82), rgba(12, 9, 8, 0.72));
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 226, 176, 0.08);
      backdrop-filter: blur(10px);
      text-align: center;
      text-transform: uppercase;
    }
    #tutorial-controls {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: clamp(18px, 2.8vw, 30px);
      font-weight: 900;
      line-height: 1.35;
      letter-spacing: 2px;
      color: #ffe1a9;
      text-shadow: 0 0 26px rgba(255, 199, 107, 0.34);
    }
    #tutorial-objective {
      margin-top: 14px;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: clamp(13px, 1.8vw, 18px);
      letter-spacing: 3px;
      color: #ffd35e;
      text-shadow: 0 0 18px rgba(255, 211, 94, 0.22);
    }

    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;

      padding: 20px;
    }
    .hud-panel {
      position: absolute; top: 20px; right: 20px;
      min-width: 220px;

      border: 1px solid rgba(255, 196, 120, 0.18);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(27, 18, 14, 0.78), rgba(13, 10, 9, 0.62));
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 226, 176, 0.08);
      backdrop-filter: blur(10px);
    }
    .hud-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }
    .hud-row + .hud-row {
      margin-top: 10px;

    .hud-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: #c7a271;
    }
    #hud-score {
      font-size: 40px;
      font-weight: 900;
      color: #ffaa44;
      text-shadow: 0 0 24px rgba(255,170,68,0.45);
    }
    #hud-best {
      font-size: 20px;
      font-weight: 700;
      color: #f3d7b1;
    }
    #hud-bolts {
      font-size: 18px;
      font-weight: 700;
      color: #ffd35e;
      text-shadow: 0 0 18px rgba(255, 211, 94, 0.35);
    }
    #hud-status {
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: 2px;
      color: #7fd6ff;
    }
    #hud-combo {
      margin-top: 10px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #7fd6ff;
      text-shadow: 0 0 12px rgba(127, 214, 255, 0.65), 0 0 24px rgba(127, 214, 255, 0.35);
      opacity: 0;
      transition: opacity 140ms ease-out;
      transform-origin: left center;
      will-change: transform, opacity, text-shadow;
    }
    #hud-combo.active { opacity: 1; }
    #hud-toast {
      position: absolute;
      top: 76px;
      left: 50%;
      transform: translate(-50%, 12px);

      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      transition: opacity 120ms ease-out, transform 120ms ease-out;
    }
    #hud-controls {
      position: absolute;
      left: 20px;
      bottom: 20px;
      padding: 10px 14px;

      color: #a8adb7;
      font-size: 11px;
      letter-spacing: 2px;
    }
    #touch-controls {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
    }
    #touch-left-zone {
      position: absolute;
      inset: auto auto 0 0;
      width: 52%;
      height: 48%;
      pointer-events: auto;
    }
    #touch-joystick {
      position: absolute;
      width: 132px;
      height: 132px;
      margin-left: -66px;
      margin-top: -66px;
      border-radius: 50%;
      border: 1px solid rgba(255, 226, 176, 0.18);
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.12), rgba(16,12,10,0.38));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      opacity: 0;
      transition: opacity 100ms ease-out;
    }
    #touch-joystick.active {
      opacity: 1;
    }
    #touch-joystick-thumb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      margin-left: -29px;
      margin-top: -29px;

      border: 1px solid rgba(255, 231, 182, 0.2);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
    }
    #touch-jump {
      position: absolute;
      right: 28px;
      bottom: 34px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      border: 1px solid rgba(159, 236, 255, 0.26);
      background: radial-gradient(circle at 35% 35%, rgba(127, 214, 255, 0.38), rgba(15, 41, 55, 0.18));
      color: #d7f8ff;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 18px;
      letter-spacing: 2px;
      pointer-events: auto;
      opacity: 0.88;
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.22);
    }
    #touch-jump.pressed {
      transform: scale(0.94);
      opacity: 1;
    }

    #title-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;

      z-index: 20; pointer-events: auto;
      background: transparent;

    #title-overlay.game-over {
      background: rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(6px);
    }
    #title-overlay h1 {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; font-size: 56px; font-weight: 900;

      letter-spacing: 6px; margin-bottom: 16px; text-align: center;
    }
    #title-overlay .tagline {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; font-size: 14px; color: #668899;
      letter-spacing: 4px; margin-bottom: 40px; text-align: center;
    }
    #title-best {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;

      letter-spacing: 3px;
      margin-top: -26px;
      margin-bottom: 28px;
      text-align: center;
    }
    #title-overlay .prompt {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; font-size: 18px; color: #ffcc00;

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .tagline.new-best {
      color: #ffd040;
      animation: glow 1.2s ease-in-out infinite;
    }
    .game-over-card {

      backdrop-filter: blur(10px);

      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: #c7a271;
    }
    .stat-value {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 22px;
      font-weight: 800;
      color: #f3d7b1;
      text-shadow: 0 0 18px rgba(255, 214, 163, 0.12);
    }
    .stat-total {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 196, 120, 0.18);
    }
    .stat-total .stat-value {
      font-size: 28px;
      color: #ffaa44;
      text-shadow: 0 0 24px rgba(255,170,68,0.28);
    }
    #share-score-btn {
      margin-bottom: 24px;
      padding: 12px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255, 196, 120, 0.36);
      background: linear-gradient(180deg, rgba(40, 28, 18, 0.92), rgba(18, 12, 8, 0.82));
      box-shadow: 0 10px 28px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255, 226, 176, 0.12);
      color: #ffe1a9;
      cursor: pointer;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 14px;
      font-weight: 700;

      transition: background 120ms ease-out, border-color 120ms ease-out, transform 120ms ease-out;

      background: linear-gradient(180deg, rgba(27, 18, 14, 0.78), rgba(13, 10, 9, 0.62));

      height: 40px;
      border-radius: 50%;

      background: linear-gradient(180deg, rgba(27, 18, 14, 0.78), rgba(13, 10, 9, 0.62));
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 226, 176, 0.08);

    }

      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 18px; color: #ffcc00;
      animation: pulse 1.5s ease-in-out infinite; text-align: center;
      margin-bottom: 32px;
    }
    #pause-restart {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 14px; font-weight: 700; letter-spacing: 3px;
      color: #ffe1a9;
      padding: 12px 32px;
      border-radius: 12px;
      border: 1px solid rgba(255, 196, 120, 0.36);

      box-shadow: 0 10px 28px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255, 226, 176, 0.12);
      cursor: pointer;
      transition: background 120ms ease-out, border-color 120ms ease-out;
    }
    #pause-restart:hover {
      background: linear-gradient(180deg, rgba(60, 42, 26, 0.95), rgba(28, 18, 10, 0.88));

    }
    .hidden { display: none !important; }
    @media (max-width: 720px) {

      #title-best {
        font-size: 11px;

        font-size: 18px;
      }
      .stat-total .stat-value {
        font-size: 24px;
      }
      #share-score-btn {
        margin-bottom: 20px;
        padding: 11px 24px;

        letter-spacing: 2px;
      }
      #zone-announcement {
        top: 16%;

      }
      #pause-btn {
        top: 14px;
        left: 14px;
      }
      #pause-overlay h2 {
        font-size: 42px;
        letter-spacing: 4px;
      }
      #pause-overlay .prompt {

    }
