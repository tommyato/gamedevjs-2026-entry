  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      align-items: center;
      justify-content: center;

      opacity: 0;

    #tutorial-card {
      max-width: min(760px, calc(100vw - 40px));
      padding: 22px 28px 20px;
      border-radius: 24px;
      border: 1px solid rgba(255, 196, 120, 0.24);

      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 226, 176, 0.08);
      backdrop-filter: blur(10px);
      text-align: center;
      text-transform: uppercase;
    }
    #tutorial-controls {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;

      text-shadow: 0 0 26px rgba(255, 199, 107, 0.34);
    }
    #tutorial-objective {
      margin-top: 14px;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: clamp(13px, 1.8vw, 18px);
      letter-spacing: 3px;
      color: #ffd35e;
      text-shadow: 0 0 18px rgba(255, 211, 94, 0.22);
    }

    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;

      padding: 20px;

      backdrop-filter: blur(10px);

      display: flex;

      font-weight: 700;
      color: #f3d7b1;
    }

      color: #ffd35e;
      text-shadow: 0 0 18px rgba(255, 211, 94, 0.35);

      letter-spacing: 2px;
      color: #7fd6ff;

      opacity: 0;
      transition: opacity 140ms ease-out;

    #hud-combo.active { opacity: 1; }
    @keyframes combo-pulse {

    #hud-controls {

      position: absolute;
      inset: auto auto 0 0;

      height: 48%;
      pointer-events: auto;
    }
    #touch-joystick {
      position: absolute;
      width: 132px;
      height: 132px;

      margin-top: -66px;

      transition: opacity 100ms ease-out;

    #touch-joystick.active {

      pointer-events: auto;
      opacity: 0.88;
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.22);
