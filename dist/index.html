  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #tutorial-card {

    #tutorial-controls {

    #tutorial-objective {

      color: #ffd35e;
      text-shadow: 0 0 18px rgba(255, 211, 94, 0.22);
    }

    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;

      transition: opacity 140ms ease-out;

      <div id="hud-controls">WASD / ARROWS TO MOVE · SPACE OR TAP TO JUMP</div>
      <button id="pause-btn" type="button" aria-label="Pause">⏸</button>
      <button id="sound-toggle" type="button" aria-label="Toggle sound">🔊</button>
    </div>
    <div id="touch-controls" class="hidden">
      <div id="touch-left-zone">
        <div id="touch-joystick">
          <div id="touch-joystick-thumb"></div>
        </div>
      </div>
      <button id="touch-jump" type="button" aria-label="Jump">JUMP</button>
    </div>
    <div id="title-overlay">
      <h1>CLOCKWORK CLIMB</h1>
      <div class="tagline">GAMEDEV.JS JAM 2026 — Theme: MACHINES</div>
      <div id="title-best" class="hidden"></div>
      <div class="game-over-card hidden">
        <div class="stat-row"><span class="stat-label">HEIGHT SCORE</span><span class="stat-value" id="go-height"></span></div>
        <div class="stat-row"><span class="stat-label">BOLT SCORE</span><span class="stat-value" id="go-bolts"></span></div>
        <div class="stat-row"><span class="stat-label">BOLTS COLLECTED</span><span class="stat-value" id="go-bolt-count"></span></div>
        <div class="stat-row"><span class="stat-label">BEST COMBO</span><span class="stat-value" id="go-combo"></span></div>
        <div class="stat-row"><span class="stat-label">TIME</span><span class="stat-value" id="go-time"></span></div>
        <div class="stat-row stat-total"><span class="stat-label">TOTAL SCORE</span><span class="stat-value" id="go-total"></span></div>
      </div>
      <button id="share-score-btn" class="hidden" type="button">SHARE ON X</button>
      <div class="prompt">PRESS SPACE OR CLICK TO CLIMB</div>
    </div>
  </div>
</body>
</html>
